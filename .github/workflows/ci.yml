name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    name: Typecheck, lint, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: printing_site
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/printing_site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - run: npm run db:migrate

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run test

  accessibility:
    name: Accessibility (axe) + e2e
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: printing_site
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/printing_site
      # Real Google OAuth is never exercised in e2e (the test-only
      # Credentials provider is used instead, per playwright.config.ts's
      # E2E_TEST_AUTH), but Auth.js still needs non-empty values to
      # configure the Google provider and sign session cookies.
      AUTH_SECRET: e2e-test-secret-not-for-production-use
      GOOGLE_CLIENT_ID: e2e-test-client-id
      GOOGLE_CLIENT_SECRET: e2e-test-client-secret
      ADMIN_ALLOWED_EMAILS: ericaburnsthings@gmail.com,jonupchurch@gmail.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - run: npm run db:migrate

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e
